name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  php-cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend
      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
        working-directory: backend

  phpstan:
    name: PHPStan (level 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend
      - name: Create cache directory
        run: mkdir -p backend/var/cache/dev
      - name: Warmup cache for PHPStan
        run: php bin/console cache:warmup --env=dev
        working-directory: backend
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G
        working-directory: backend

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          tools: composer:v2
          coverage: pcov
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend
      - name: Prepare test env
        run: |
          cp .env .env.test.local 2>/dev/null || true
          echo APP_ENV=test >> .env.test.local
          echo DATABASE_URL="sqlite:///%kernel.project_dir%/var/data_test.db" >> .env.test.local
        working-directory: backend
      - name: Create JWT keys (dummy for tests)
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -pkeyopt rsa_keygen_bits:2048 2>/dev/null
          openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem 2>/dev/null
        working-directory: backend
      - name: Run PHPUnit with coverage
        run: |
          mkdir -p coverage
          php bin/phpunit --coverage-cobertura coverage/cobertura.xml --coverage-text 2>&1 | tee coverage/summary.txt
        working-directory: backend
      - name: PHP Coverage Summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage/cobertura.xml
          badge: true
          format: markdown
          output: both
          hide_complexity: true
          indicators: true
          thresholds: '60 80'
      - name: Add PHP Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: php-coverage
          recreate: true
          path: code-coverage-results.md

  vitest:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run Vitest with coverage
        run: npx vitest run --coverage
        working-directory: frontend
      - name: Frontend Coverage Summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: frontend/coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          output: both
          hide_complexity: true
          indicators: true
          thresholds: '60 80'
      - name: Add Frontend Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: frontend-coverage
          recreate: true
          path: code-coverage-results.md

  app-e2e:
    name: App E2E (Playwright Functional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          tools: composer:v2
          coverage: none
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            tests/package-lock.json
      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install root E2E dependencies
        run: npm ci
        working-directory: tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests
      - name: Run Playwright functional suite
        run: npx playwright test --project=functional
        working-directory: tests
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-e2e-playwright-report
          path: tests/playwright-report
          if-no-files-found: ignore
      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: app-e2e-test-results
          path: tests/test-results
          if-no-files-found: ignore

  app-e2e-visual:
    name: App E2E (Playwright Visual)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          tools: composer:v2
          coverage: none
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            tests/package-lock.json
      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install root E2E dependencies
        run: npm ci
        working-directory: tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests
      - name: Run Playwright visual suite
        run: npx playwright test --project=visual
        working-directory: tests
      - name: Upload visual Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-e2e-visual-playwright-report
          path: tests/playwright-report
          if-no-files-found: ignore
      - name: Upload visual diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: app-e2e-visual-test-results
          path: tests/test-results
          if-no-files-found: ignore
