# Local stack: Symfony API (FrankenPHP), MariaDB, Vue + Vite dev server.
# 1. composer install in ./backend (vendor is bind-mounted, not baked into the image)
# 2. docker compose up --build
# API: http://localhost:8080  ·  Vite: http://localhost:5173

services:
  frankenphp:
    build:
      context: ./docker/frankenphp
    working_dir: /app
    ports:
      - "8080:80"
      - "8443:443"
      - "8443:443/udp"
    volumes:
      - ./backend:/app
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - ./backend/.env
      - ./backend/.env.local
    environment:
      SERVER_NAME: ":80"
      # Overrides sqlite default from .env when running in Compose
      DATABASE_URL: "mysql://komm:komm@mariadb:3306/komm?serverVersion=11.4.0-MariaDB&charset=utf8mb4"
    depends_on:
      mariadb:
        condition: service_healthy
    tty: true

  mariadb:
    image: mariadb:11.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: komm
      MYSQL_USER: komm
      MYSQL_PASSWORD: komm
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  frontend:
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      # Own .nuxt in the container: generated files contain absolute paths; sharing the host
      # .nuxt (macOS paths) breaks @nuxt/ui Tailwind config resolution under /app.
      - frontend_nuxt:/app/.nuxt
    environment:
      API_PROXY_TARGET: http://frankenphp:80
      NODE_OPTIONS: "--max-old-space-size=1024"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1500"
    env_file:
      - ./frontend/.env.local
    command: sh ./scripts/docker-dev.sh

volumes:
  caddy_data:
  caddy_config:
  mariadb_data:
  frontend_node_modules:
  frontend_nuxt:
