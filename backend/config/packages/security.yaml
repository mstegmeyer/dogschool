security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        customer_provider:
            entity:
                class: App\Entity\Customer
                property: email
        admin_provider:
            entity:
                class: App\Entity\User
                property: username
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        customer_register:
            pattern: ^/api/customer/register
            stateless: true
            security: false
        customer_login:
            pattern: ^/api/customer/login
            stateless: true
            provider: customer_provider
            json_login:
                check_path: /api/customer/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        customer_api:
            pattern: ^/api/customer
            stateless: true
            provider: customer_provider
            jwt: ~
        admin_login:
            pattern: ^/api/admin/login
            stateless: true
            provider: admin_provider
            json_login:
                check_path: /api/admin/login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        admin_api:
            pattern: ^/api/admin
            stateless: true
            provider: admin_provider
            jwt: ~
    access_control:
        - { path: ^/api/customer/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/customer/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/customer, roles: ROLE_CUSTOMER }
        - { path: ^/api/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

when@e2e:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
