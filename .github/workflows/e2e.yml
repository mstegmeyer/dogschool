name: e2e

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-e2e:
    name: playwright-functional
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          tools: composer:v2
          coverage: none
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            tests/package-lock.json
      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install root E2E dependencies
        run: npm ci
        working-directory: tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests
      - name: Run Playwright functional suite
        run: npx playwright test --project=functional
        working-directory: tests
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-e2e-playwright-report
          path: tests/playwright-report
          if-no-files-found: ignore
      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: app-e2e-test-results
          path: tests/test-results
          if-no-files-found: ignore

  app-e2e-visual:
    name: playwright-visual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          tools: composer:v2
          coverage: none
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            tests/package-lock.json
      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install root E2E dependencies
        run: npm ci
        working-directory: tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests
      - name: Run Playwright visual suite
        run: npx playwright test --project=visual
        working-directory: tests
      - name: Upload visual Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-e2e-visual-playwright-report
          path: tests/playwright-report
          if-no-files-found: ignore
      - name: Upload visual diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: app-e2e-visual-test-results
          path: tests/test-results
          if-no-files-found: ignore
